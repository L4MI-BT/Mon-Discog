{% extends "layout.html" %}

{% block content %}
    
<div class="container">
    <div class="text-center m-5">
        {% if error %}
            <p class="text-danger">{{ error }}</p>
        {% endif %}
        <form action="" method="post">
            {% csrf_token %}
            <label for="code">Reference du disque</label>
            <input type="text" name="code" id="code">
            <input type="submit" value="Valider">
        </form>
    </div>
</div>
{% endblock %}
